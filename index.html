<div class="container d-flex justify-content-center">
<div class="col-md-6 glass-container text-center">

 <h1 class="fw-bold display-4 fst-italic">Fare Calculator</h1>


<div class="mb-3 text-start">
 <label class="form-label">Pickup Station</label>

<select id="pickup" class="form-select">
  <option value="0">Roosevelt</option>
  <option value="20">Baclaran</option>
  <option value="5">Santolan</option>
  <option value="13">Recto</option>
  <option value="2">North Avenue</option>
  <option value="17">Taft Avenue</option>
</select>

</div>


<div class="mb-3 text-start">
<label class="form-label">Dropoff Station</label>
<select id="dropoff" class="form-select">
  <option value="0">Roosevelt</option>
  <option value="20">Baclaran</option>
  <option value="5">Santolan</option>
  <option value="13">Recto</option>
  <option value="2">North Avenue</option>
  <option value="17">Taft Avenue</option>
</select>
</div>


<div class="form-check mb-3 text-start">
<input class="form-check-input" type="checkbox" id="discount">
<label class="form-check-label">Apply 20% Discount</label>
</div>

<button class="btn btn-light w-100 mb-3" onclick="calculateFare()">Calculate Fare</button>

<h3 id="result">₱0.00</h3>

<img src="https://cdn.discordapp.com/attachments/1477991952837382174/1478007039446880266/Screenshot_2026-02-24_181344.png?ex=69a6d4d2&is=69a58352&hm=165e679317dc3e34b8dab2fb1cec14a6e58e3bfe7d0e019dc4d4091b0c7074bf" alt="map.img" class="map-img">

</div>
</div>

<script>
function calculateFare() {

let pickup = parseFloat(document.getElementById("pickup").value);
let dropoff = parseFloat(document.getElementById("dropoff").value);

let baseFare = 50;
let baseKM = 2;
let perKM = 15;

let distance = Math.abs(dropoff - pickup);
let extraKM = Math.max(distance - baseKM, 0);

let total = baseFare + (extraKM * perKM);

if (document.getElementById("discount").checked) {
    total = total * 0.80;
}

document.getElementById("result").innerHTML = "₱" + total.toFixed(2);
}
</script>
